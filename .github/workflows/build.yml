name: Build fltorrent for Linux

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libfltk1.3-dev \
            libtorrent-rasterbar-dev \
            libboost-thread-dev

      - name: Create build directory
        run: mkdir -p build && cd build

      - name: Configure the build
        run: |
          cd build
          g++ ../fltorrent.cxx -o fltorrent $(fltk-config --cxxflags --ldflags) -ltorrent-rasterbar -lboost_system -lboost_thread -lpthread

      - name: Build the project
        run: |
          cd build
          make -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: fltorrent-linux
          path: build/fltorrent  # Adjust the path if the binary name or location differs
